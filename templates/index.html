<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentOps AI Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; }

    /* Header */
    header { background: #1e293b; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #334155; }
    header h1 { font-size: 18px; font-weight: 600; }
    header h1 span { color: #38bdf8; }
    .trace-info { display: flex; align-items: center; gap: 12px; font-size: 12px; }
    .trace-info .trace-id { color: #64748b; font-family: monospace; }
    .trace-info a { color: #38bdf8; text-decoration: none; }
    .trace-info a:hover { text-decoration: underline; }
    .header-actions { display: flex; gap: 8px; }
    .header-actions button { background: #334155; color: #94a3b8; border: 1px solid #475569; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .header-actions button:hover { background: #475569; color: #e2e8f0; }

    /* Layout */
    .container { display: flex; flex: 1; overflow: hidden; }

    /* Chat panel */
    .chat-panel { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #334155; }
    .panel-header { padding: 10px 20px; background: #1e293b; font-size: 13px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #334155; }
    .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
    .message { max-width: 80%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-wrap: break-word; }
    .message.user { align-self: flex-end; background: #1d4ed8; color: white; border-bottom-right-radius: 4px; }
    .message.assistant { align-self: flex-start; background: #1e293b; border: 1px solid #334155; border-bottom-left-radius: 4px; }
    .message.tool { align-self: flex-start; background: #064e3b; border: 1px solid #065f46; font-family: monospace; font-size: 12px; padding: 8px 12px; border-radius: 6px; }
    .message.system { align-self: center; color: #64748b; font-size: 12px; font-style: italic; }
    .typing { align-self: flex-start; color: #64748b; font-size: 13px; padding: 8px 16px; }
    .typing::after { content: "..."; animation: dots 1.5s infinite; }
    @keyframes dots { 0%,20% { content: "."; } 40% { content: ".."; } 60%,100% { content: "..."; } }

    /* Input */
    .input-bar { padding: 16px 20px; background: #1e293b; border-top: 1px solid #334155; display: flex; gap: 10px; }
    .input-bar input { flex: 1; background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 12px 16px; border-radius: 8px; font-size: 14px; outline: none; }
    .input-bar input:focus { border-color: #38bdf8; }
    .input-bar button { background: #2563eb; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 500; }
    .input-bar button:hover { background: #1d4ed8; }
    .input-bar button:disabled { background: #334155; cursor: not-allowed; }

    /* Log panel */
    .log-panel { width: 480px; display: flex; flex-direction: column; background: #0f172a; }
    .log-panel.collapsed { width: 0; overflow: hidden; border: none; }
    .summary-cards { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 12px 16px; }
    .card.wide { grid-column: span 3; }
    .card.wide .value { color: #f59e0b; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 10px 12px; }
    .card .label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
    .card .value { font-size: 20px; font-weight: 700; color: #38bdf8; margin-top: 2px; }
    .log-list { flex: 1; overflow-y: auto; padding: 0 16px 16px; display: flex; flex-direction: column; gap: 8px; }
    .log-entry { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 12px; cursor: pointer; transition: border-color 0.15s; }
    .log-entry:hover { border-color: #475569; }
    .log-entry.expanded .log-detail { display: block; }
    .log-meta { display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
    .log-meta .time { color: #64748b; font-family: monospace; }
    .log-meta .badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .badge.tool_use { background: #422006; color: #f59e0b; }
    .badge.end_turn { background: #052e16; color: #4ade80; }
    .log-tokens { font-size: 11px; color: #64748b; margin-top: 4px; font-family: monospace; }
    .log-detail { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid #334155; }
    .log-detail pre { font-size: 11px; color: #94a3b8; white-space: pre-wrap; word-break: break-all; max-height: 300px; overflow-y: auto; background: #0f172a; padding: 8px; border-radius: 4px; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
  </style>
</head>
<body>
  <header>
    <h1><span>AgentOps</span> AI Agent</h1>
    <div class="trace-info">
      <span id="sessionName" style="color: #e2e8f0; font-weight: 500;"></span>
      <span class="trace-id" id="traceId"></span>
      <a id="traceLink" href="#" target="_blank">Open in AgentOps</a>
    </div>
    <div class="header-actions">
      <button onclick="showTraceHistory()">Trace History</button>
      <button onclick="resetChat()">New Chat</button>
      <button onclick="toggleLogs()">Toggle Logs</button>
      <button onclick="refreshLogs()">Refresh Logs</button>
    </div>
  </header>

  <div class="container">
    <!-- Chat Panel -->
    <div class="chat-panel">
      <div class="panel-header">Chat</div>
      <div class="messages" id="messages">
        <div class="message system">Tools available: web_search, fetch_url, calculator, wikipedia_search, wikipedia_summary, get_current_datetime</div>
      </div>
      <div class="input-bar">
        <input type="text" id="input" placeholder="Ask me anything..." autocomplete="off" />
        <button id="sendBtn" onclick="send()">Send</button>
      </div>
    </div>

    <!-- Log Panel -->
    <div class="log-panel" id="logPanel">
      <div class="panel-header">LLM Call Log</div>
      <div class="summary-cards" id="summary">
        <div class="card"><div class="label">Total Calls</div><div class="value" id="totalCalls">0</div></div>
        <div class="card"><div class="label">Tool Calls</div><div class="value" id="toolCalls">0</div></div>
        <div class="card"><div class="label">Input Tokens</div><div class="value" id="inputTokens">0</div></div>
        <div class="card"><div class="label">Output Tokens</div><div class="value" id="outputTokens">0</div></div>
        <div class="card wide"><div class="label">Total Cost</div><div class="value" id="totalCost">$0.0000</div></div>
      </div>
      <div class="log-list" id="logList"></div>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");

    inputEl.addEventListener("keydown", e => { if (e.key === "Enter" && !sendBtn.disabled) send(); });

    function addMessage(role, text) {
      const div = document.createElement("div");
      div.className = `message ${role}`;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showTyping() {
      const div = document.createElement("div");
      div.className = "typing";
      div.id = "typing";
      div.textContent = "Thinking";
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById("typing");
      if (el) el.remove();
    }

    async function send() {
      const text = inputEl.value.trim();
      if (!text) return;
      inputEl.value = "";
      sendBtn.disabled = true;
      addMessage("user", text);
      showTyping();

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({message: text}),
        });
        const data = await res.json();
        hideTyping();
        if (data.tools) {
          data.tools.forEach(t => addMessage("tool", t));
        }
        addMessage("assistant", data.response || data.error);
      } catch (err) {
        hideTyping();
        addMessage("system", "Error: " + err.message);
      }
      sendBtn.disabled = false;
      inputEl.focus();
      refreshLogs();
    }

    async function resetChat() {
      await fetch("/api/reset", {method: "POST"});
      messagesEl.innerHTML = '<div class="message system">Tools available: web_search, fetch_url, calculator, wikipedia_search, wikipedia_summary, get_current_datetime</div>';
      inputEl.focus();
    }

    function toggleLogs() {
      document.getElementById("logPanel").classList.toggle("collapsed");
    }

    async function refreshLogs() {
      try {
        const [summaryRes, logsRes] = await Promise.all([
          fetch("/api/logs/summary"),
          fetch("/api/logs"),
        ]);
        const summary = await summaryRes.json();
        const logs = await logsRes.json();

        document.getElementById("totalCalls").textContent = (summary.total_calls || 0).toLocaleString();
        document.getElementById("toolCalls").textContent = (summary.tool_use_calls || 0).toLocaleString();
        document.getElementById("inputTokens").textContent = (summary.input_tokens || 0).toLocaleString();
        document.getElementById("outputTokens").textContent = (summary.output_tokens || 0).toLocaleString();
        document.getElementById("totalCost").textContent = "$" + (summary.total_cost_usd || 0).toFixed(4);

        const logList = document.getElementById("logList");
        logList.innerHTML = "";
        logs.slice().reverse().forEach((entry, i) => {
          const usage = entry.response.usage;
          const stop = entry.response.stop_reason;
          const time = entry.timestamp.substring(11, 19);
          const div = document.createElement("div");
          div.className = "log-entry";
          div.innerHTML = `
            <div class="log-meta">
              <span class="time">${time}</span>
              <span class="badge ${stop}">${stop}</span>
            </div>
            <div class="log-tokens">in: ${usage.input_tokens} &nbsp; out: ${usage.output_tokens} &nbsp; $${(usage.cost_usd || 0).toFixed(4)}</div>
            <div class="log-detail">
              <pre>${JSON.stringify(entry, null, 2)}</pre>
            </div>
          `;
          div.addEventListener("click", () => div.classList.toggle("expanded"));
          logList.appendChild(div);
        });
      } catch (e) {
        console.error("Failed to load logs", e);
      }
    }

    async function loadTrace() {
      try {
        const res = await fetch("/api/trace");
        const data = await res.json();
        const el = document.getElementById("traceId");
        document.getElementById("sessionName").textContent = data.session_name || "";
        el.textContent = data.trace_id.substring(0, 8) + "...";
        el.title = data.trace_id;
        const link = document.getElementById("traceLink");
        link.href = data.dashboard_url;
      } catch (e) {
        console.error("Failed to load trace", e);
      }
    }

    async function showTraceHistory() {
      try {
        const res = await fetch("/api/traces");
        const traces = await res.json();
        const lines = traces.slice().reverse().map(t =>
          `${t.timestamp.substring(0, 19)}  ${t.trace_id}\n${t.dashboard_url}`
        ).join("\n\n");
        addMessage("system", "--- Trace History ---\n" + (lines || "No traces yet."));
      } catch (e) {
        addMessage("system", "Error loading traces: " + e.message);
      }
    }

    loadTrace();
    refreshLogs();
    inputEl.focus();
  </script>
</body>
</html>
